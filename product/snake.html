<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        h1 {
            color: #00ff88;
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0,255,136,0.5);
            letter-spacing: 8px;
        }
        #gameContainer {
            position: relative;
        }
        #gameCanvas {
            border: 2px solid #00ff88;
            box-shadow: 0 0 30px rgba(0,255,136,0.3),
                        inset 0 0 30px rgba(0,255,136,0.1);
            border-radius: 4px;
        }
        #score {
            position: absolute;
            top: -40px;
            right: 0;
            color: #00ff88;
            font-size: 1.2rem;
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            font-size: 1.2rem;
            background: transparent;
            color: #00ff88;
            border: 2px solid #00ff88;
            cursor: pointer;
            letter-spacing: 4px;
            transition: all 0.3s;
            font-family: inherit;
        }
        #startBtn:hover {
            background: #00ff88;
            color: #0a0a0a;
            box-shadow: 0 0 30px rgba(0,255,136,0.5);
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
        }
        #gameOver h2 {
            color: #ff6b6b;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,107,107,0.5);
        }
        #gameOver p {
            color: #fff;
            font-size: 1rem;
        }
        #restartBtn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 1rem;
            background: transparent;
            color: #00ff88;
            border: 2px solid #00ff88;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.3s;
            font-family: inherit;
        }
        #restartBtn:hover {
            background: #00ff88;
            color: #0a0a0a;
        }
        #instructions {
            margin-top: 20px;
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <h1>SNAKE</h1>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div id="score">得分: 0</div>
        <button id="startBtn">开始游戏</button>
        <div id="gameOver">
            <h2>GAME OVER</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button id="restartBtn">重新开始</button>
        </div>
    </div>
    <p id="instructions">方向键 或 WASD 控制移动</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const scoreEl = document.getElementById('score');
        const gameOverEl = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop = null;
        let isRunning = false;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreEl.textContent = '得分: ' + score;
            placeFood();
        }

        function placeFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            // 避免食物生成在蛇身上
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    placeFood();
                    break;
                }
            }
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格（微弱）
            ctx.strokeStyle = 'rgba(0,255,136,0.05)';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((part, index) => {
                const gradient = ctx.createRadialGradient(
                    part.x * gridSize + gridSize/2, part.y * gridSize + gridSize/2, 0,
                    part.x * gridSize + gridSize/2, part.y * gridSize + gridSize/2, gridSize/2
                );
                if (index === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    gradient.addColorStop(0, '#00cc6a');
                    gradient.addColorStop(1, '#008844');
                }
                ctx.fillStyle = gradient;
                ctx.fillRect(part.x * gridSize + 1, part.y * gridSize + 1, gridSize - 2, gridSize - 2);
                
                // 蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = '#0a0a0a';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    if (dx === 1) {
                        ctx.fillRect(part.x * gridSize + gridSize - eyeOffset - eyeSize, part.y * gridSize + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(part.x * gridSize + gridSize - eyeOffset - eyeSize, part.y * gridSize + gridSize - eyeOffset - eyeSize, eyeSize, eyeSize);
                    } else if (dx === -1) {
                        ctx.fillRect(part.x * gridSize + eyeOffset, part.y * gridSize + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(part.x * gridSize + eyeOffset, part.y * gridSize + gridSize - eyeOffset - eyeSize, eyeSize, eyeSize);
                    } else if (dy === 1) {
                        ctx.fillRect(part.x * gridSize + eyeOffset, part.y * gridSize + gridSize - eyeOffset - eyeSize, eyeSize, eyeSize);
                        ctx.fillRect(part.x * gridSize + gridSize - eyeOffset - eyeSize, part.y * gridSize + gridSize - eyeOffset - eyeSize, eyeSize, eyeSize);
                    } else if (dy === -1) {
                        ctx.fillRect(part.x * gridSize + eyeOffset, part.y * gridSize + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(part.x * gridSize + gridSize - eyeOffset - eyeSize, part.y * gridSize + eyeOffset, eyeSize, eyeSize);
                    }
                }
            });

            // 绘制食物
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, 0,
                food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#cc4444');
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 食物光晕
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function update() {
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // 撞墙检测
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // 撞自己检测
            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            // 吃食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = '得分: ' + score;
                placeFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            isRunning = false;
            clearInterval(gameLoop);
            finalScoreEl.textContent = score;
            gameOverEl.style.display = 'block';
        }

        function startGame() {
            initGame();
            draw();
            isRunning = true;
            startBtn.style.display = 'none';
            gameOverEl.style.display = 'none';
            gameLoop = setInterval(update, 100);
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        document.addEventListener('keydown', (e) => {
            if (!isRunning) return;
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });

        // 初始绘制
        draw();
    </script>
</body>
</html>
